<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Render World Map</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f8fb;
    }

    body {
      display: grid;
      place-items: center;
    }

    img {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      object-position: center center;
      filter: grayscale(1) contrast(0.92) brightness(1.02);
    }
  </style>
</head>
<body>
  <img src="./world-map-equirectangular.svg" alt="World map">
</body>
</html>
